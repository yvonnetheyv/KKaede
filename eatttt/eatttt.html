<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>今日の夕食は?</title>
    <style>
        /* ===== Reset & Base ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --brand: #1B365D;
            --brand-light: #2D5A8A;
            --parchment: #f5f4ed;
            --ivory: #faf9f5;
            --warm-sand: #e8e6dc;
            --border: #e8e6dc;
            --border-soft: #e5e3d8;
            --near-black: #141413;
            --dark-warm: #3d3d3a;
            --olive: #504e49;
            --stone: #6b6a64;
            --tag-fill: #E4ECF5;
            --tag-active: #1B365D;
            --radius: 8px;
            --radius-sm: 4px;
            --serif: Charter, Georgia, Palatino, "Times New Roman", serif;
            --sans: var(--serif);
            --mono: "JetBrains Mono", "SF Mono", "Fira Code", Consolas, Monaco, "Source Han Serif SC", monospace;
            --max-width: 1120px;
            --shadow-whisper: 0 4px 24px rgba(0, 0, 0, 0.05);
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--parchment);
            color: var(--near-black);
            font-family: var(--serif);
            font-weight: 400;
            line-height: 1.55;
            padding: 40px 24px 80px;
            min-height: 100vh;
        }

        /* ===== Typography ===== */
        h1,
        h2,
        h3,
        h4 {
            font-weight: 500;
            font-family: var(--serif);
        }

        h1 {
            font-size: 42px;
            line-height: 1.12;
            letter-spacing: -0.5px;
            color: var(--near-black);
        }

        h2 {
            font-size: 22px;
            line-height: 1.25;
            letter-spacing: 0;
            color: var(--near-black);
            margin-bottom: 12px;
        }

        h3 {
            font-size: 17px;
            line-height: 1.30;
            letter-spacing: 0;
            color: var(--near-black);
            font-weight: 500;
        }

        .eyebrow {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--stone);
            font-family: var(--sans);
            line-height: 1;
            margin-bottom: 4px;
        }

        .caption {
            font-size: 12px;
            font-weight: 500;
            line-height: 1.45;
            color: var(--olive);
            font-family: var(--sans);
        }

        .stone-text {
            color: var(--stone);
        }

        /* ===== Layout ===== */
        .container {
            max-width: var(--max-width);
            margin: 0 auto;
        }

        /* Header */
        .page-header {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            gap: 8px 16px;
        }

        .page-header .sub {
            font-size: 15px;
            color: var(--olive);
            font-weight: 400;
        }

        .page-header .badge {
            font-size: 12px;
            color: var(--stone);
            font-weight: 500;
            letter-spacing: 0.4px;
            font-family: var(--sans);
        }

        /* Two-column layout */
        .two-col {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 32px;
            align-items: start;
        }

        @media (max-width: 860px) {
            .two-col {
                grid-template-columns: 1fr;
                gap: 28px;
            }
            body {
                padding: 24px 16px 60px;
            }
            h1 {
                font-size: 32px;
            }
            .page-header {
                margin-bottom: 28px;
                padding-bottom: 16px;
            }
        }

        /* ===== Card ===== */
        .card {
            background: var(--ivory);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 24px 20px;
            transition: box-shadow 0.2s;
        }

        .card:hover {
            box-shadow: var(--shadow-whisper);
        }

        .card+.card {
            margin-top: 20px;
        }

        .card-title {
            font-size: 17px;
            font-weight: 500;
            line-height: 1.30;
            color: var(--near-black);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title .icon {
            font-size: 20px;
            line-height: 1;
        }

        /* ===== Tags / Chips (cuisine selector) ===== */
        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 8px;
            margin-bottom: 16px;
        }

        .tag {
            font: 500 12px/1 var(--sans);
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            color: var(--brand);
            background: var(--tag-fill);
            letter-spacing: 0.4px;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s, color 0.15s, box-shadow 0.15s;
            border: 1px solid transparent;
            display: inline-block;
        }

        .tag:hover {
            background: #D6E1EE;
        }

        .tag.active {
            background: var(--tag-active);
            color: var(--ivory);
            border-color: var(--tag-active);
        }

        .tag .count {
            opacity: 0.6;
            margin-left: 2px;
            font-size: 11px;
        }

        /* ===== Forms ===== */
        .form-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 16px;
            margin-bottom: 14px;
        }

        .form-row label {
            font-size: 14px;
            font-weight: 500;
            color: var(--dark-warm);
            font-family: var(--sans);
            letter-spacing: 0.2px;
        }

        .form-row .hint {
            font-size: 12px;
            color: var(--stone);
            font-weight: 400;
            font-family: var(--sans);
        }

        input[type="number"] {
            font: 500 14px/1 var(--serif);
            color: var(--near-black);
            background: var(--ivory);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 6px 10px;
            width: 72px;
            text-align: center;
            transition: border-color 0.15s;
            -moz-appearance: textfield;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 2px rgba(27, 54, 93, 0.10);
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* ===== Buttons ===== */
        .btn {
            font: 500 12px/1 var(--sans);
            letter-spacing: 0.4px;
            padding: 8px 16px;
            border-radius: var(--radius);
            border: none;
            cursor: pointer;
            transition: box-shadow 0.15s, background 0.15s, color 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
        }

        .btn-primary {
            background: var(--brand);
            color: var(--ivory);
            box-shadow: 0 0 0 1px var(--brand);
        }

        .btn-primary:hover {
            background: #243f6a;
            box-shadow: 0 0 0 1px #243f6a, var(--shadow-whisper);
        }

        .btn-secondary {
            background: var(--warm-sand);
            color: var(--dark-warm);
            box-shadow: 0 0 0 1px var(--border);
        }

        .btn-secondary:hover {
            background: #dddacf;
            box-shadow: 0 0 0 1px var(--border), var(--shadow-whisper);
        }

        .btn-ghost {
            background: transparent;
            color: var(--brand);
            box-shadow: 0 0 0 1px var(--brand);
        }

        .btn-ghost:hover {
            background: var(--tag-fill);
            box-shadow: 0 0 0 1px var(--brand), var(--shadow-whisper);
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 11px;
            letter-spacing: 0.3px;
        }

        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            box-shadow: 0 0 0 1px var(--border);
        }

        /* ===== Result Area ===== */
        .result-box {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-soft);
        }

        .result-box .result-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--stone);
            letter-spacing: 0.4px;
            text-transform: uppercase;
            font-family: var(--sans);
            margin-bottom: 6px;
        }

        .result-text {
            font-size: 18px;
            font-weight: 500;
            line-height: 1.50;
            color: var(--near-black);
            font-family: var(--serif);
            padding: 8px 0 4px;
            min-height: 2.2em;
            word-break: break-all;
        }

        .result-text .empty-hint {
            color: var(--stone);
            font-weight: 400;
            font-size: 15px;
        }

        .result-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 12px;
            margin-top: 8px;
        }

        /* ===== Saved Recipes ===== */
        .saved-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .saved-item {
            background: var(--parchment);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-sm);
            padding: 10px 12px 10px 14px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
            font-size: 13px;
            line-height: 1.45;
        }

        .saved-item .dishes {
            flex: 1;
            color: var(--near-black);
            font-weight: 500;
        }

        .saved-item .meta {
            font-size: 11px;
            color: var(--stone);
            font-weight: 400;
            font-family: var(--sans);
            white-space: nowrap;
            margin-top: 1px;
        }

        .saved-item .del-btn {
            background: none;
            border: none;
            color: var(--stone);
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            padding: 0 2px;
            transition: color 0.15s;
            flex-shrink: 0;
        }

        .saved-item .del-btn:hover {
            color: var(--near-black);
        }

        .saved-empty {
            font-size: 13px;
            color: var(--stone);
            font-weight: 400;
            padding: 8px 0;
            font-family: var(--sans);
        }

        /* ===== Collapsible Cuisine List ===== */
        .cuisine-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .cuisine-item {
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-sm);
            background: var(--parchment);
            overflow: hidden;
        }

        .cuisine-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px 8px 14px;
            cursor: pointer;
            user-select: none;
            transition: background 0.12s;
            gap: 8px;
        }

        .cuisine-header:hover {
            background: var(--warm-sand);
        }

        .cuisine-header .name {
            font-size: 14px;
            font-weight: 500;
            color: var(--near-black);
            font-family: var(--serif);
        }

        .cuisine-header .count {
            font-size: 12px;
            color: var(--stone);
            font-weight: 400;
            font-family: var(--sans);
            margin-left: auto;
        }

        .cuisine-header .arrow {
            font-size: 12px;
            color: var(--stone);
            transition: transform 0.2s;
            flex-shrink: 0;
            line-height: 1;
        }

        .cuisine-item.open .arrow {
            transform: rotate(180deg);
        }

        .cuisine-body {
            padding: 0 14px 0 14px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.28s ease, padding 0.28s ease;
        }

        .cuisine-item.open .cuisine-body {
            max-height: 800px;
            padding: 4px 14px 12px 14px;
            overflow-y: auto;
        }

        .cuisine-body .desc {
            font-size: 13px;
            color: var(--olive);
            line-height: 1.50;
            margin-bottom: 6px;
            font-weight: 400;
        }

        .cuisine-body .items {
            font-size: 12px;
            color: var(--dark-warm);
            line-height: 1.60;
            font-weight: 400;
            word-break: break-all;
        }

        /* ===== Scrollbar ===== */
        .saved-list::-webkit-scrollbar,
        .cuisine-item.open .cuisine-body::-webkit-scrollbar {
            width: 4px;
            background: transparent;
        }

        .saved-list::-webkit-scrollbar-thumb,
        .cuisine-item.open .cuisine-body::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        /* ===== Responsive fine-tune ===== */
        @media (max-width: 480px) {
            .tag {
                font-size: 11px;
                padding: 3px 8px;
            }
            .result-text {
                font-size: 16px;
            }
            .card {
                padding: 18px 16px 16px;
            }
            .form-row {
                gap: 8px 12px;
            }
            .btn {
                padding: 6px 12px;
                font-size: 11px;
            }
            .page-header .sub {
                font-size: 14px;
            }
            h1 {
                font-size: 28px;
            }
        }

        /* ===== Utility ===== */
        .mt-8 {
            margin-top: 8px;
        }
        .mt-12 {
            margin-top: 12px;
        }
        .mb-8 {
            margin-bottom: 8px;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        /* ===== Notification ===== */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--near-black);
            color: var(--ivory);
            padding: 10px 24px;
            border-radius: var(--radius);
            font: 500 13px/1 var(--sans);
            letter-spacing: 0.3px;
            box-shadow: var(--shadow-whisper);
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
        }

        /* Tabular numbers */
        .tabular-nums {
            font-variant-numeric: tabular-nums;
        }

        /* Selected cuisine hint */
        .selection-hint {
            font-size: 12px;
            color: var(--stone);
            font-weight: 400;
            font-family: var(--sans);
            min-height: 1.4em;
            margin-bottom: 8px;
        }

        .selection-hint strong {
            font-weight: 500;
            color: var(--dark-warm);
        }
    </style>
</head>
<body>

    <!-- ===== Toast ===== -->
    <div id="toast" class="toast"></div>

    <div class="container">

        <!-- ===== Header ===== -->
        <header class="page-header">
            <div>
                <h2> 今日の夕食は? </h2>
                <div class="sub">版权|喵喵电波八大菜系世界书 梨花雨@mistbutte</div>
            </div>
            <div class="badge" id="totalBadge">加载中…</div>
        </header>

        <!-- ===== Two Column Main ===== -->
        <div class="two-col">

            <!-- ===== LEFT COLUMN ===== -->
            <div class="left-col">

                <!-- Card: 生成菜谱吧！ -->
                <div class="card">
                    <div class="card-title">
                        生成菜谱吧！
                        <span style="font-weight:400;font-size:12px;color:var(--stone);font-family:var(--sans);letter-spacing:0.3px;margin-left:auto;">选菜系 · 定数量</span>
                    </div>

                    <!-- Cuisine tags -->
                    <div class="tag-group" id="cuisineTags"></div>
                    <div class="selection-hint" id="selectionHint">点击上方标签选择菜系</div>

                    <div class="form-row">
                        <label for="numDishes">菜品数量</label>
                        <input type="number" id="numDishes" class="tabular-nums" value="4" min="1" max="20" />
                        <span class="hint">（1–20）</span>
                        <button class="btn btn-primary" id="btnGenerate">生成</button>
                    </div>

                    <!-- Divider + 随便吃点！ -->
                    <div style="border-top:1px solid var(--border-soft);margin:12px 0 14px;"></div>

                    <div style="display:flex;flex-wrap:wrap;align-items:center;gap:10px 20px;">
                        <span style="font-weight:500;font-size:15px;color:var(--near-black);font-family:var(--serif);">随便吃点！</span>
                        <label for="numRandom" style="font-size:13px;color:var(--dark-warm);font-weight:500;font-family:var(--sans);">数量</label>
                        <input type="number" id="numRandom" class="tabular-nums" value="3" min="1" max="20" style="width:60px;" />
                        <button class="btn btn-secondary" id="btnRandom">随便吃点</button>
                        <span class="hint" style="font-size:11px;">全菜系随机</span>
                    </div>

                    <!-- Result -->
                    <div class="result-box" id="resultBox">
                        <div class="result-label">今日のレシピ</div>
                        <div class="result-text" id="resultText"><span class="empty-hint">点击「生成」或「随便吃点」试试</span></div>
                        <div class="result-actions" id="resultActions">
                            <button class="btn btn-ghost btn-sm" id="btnSave">暂存菜谱</button>
                            <button class="btn btn-ghost btn-sm" id="btnCopy">复制食谱</button>
                            <button class="btn btn-secondary btn-sm" id="btnRegen">重新生成</button>
                        </div>
                    </div>
                </div>

                <!-- Card: 快捷说明 (optional, 可放一些信息) -->
                <div class="card" style="padding:14px 20px;">
                    <div style="display:flex;flex-wrap:wrap;gap:8px 24px;font-size:13px;color:var(--olive);font-weight:400;">
                        <span>共 <strong id="totalCuisines" style="font-weight:500;color:var(--near-black);">0</strong> 个菜系</span>
                        <span>总计 <strong id="totalDishesCount" style="font-weight:500;color:var(--near-black);">0</strong> 道菜品</span>
                        <span style="color:var(--stone);font-size:12px;">数据来源 · 食谱世界书</span>
                    </div>
                </div>

            </div>

            <!-- ===== RIGHT COLUMN ===== -->
            <div class="right-col">

                <!-- Card: 暂存菜谱 -->
                <div class="card">
                    <div class="card-title" style="margin-bottom:10px;">
                        <span class="icon"></span> 暂存菜谱
                        <span style="font-weight:400;font-size:12px;color:var(--stone);font-family:var(--sans);margin-left:auto;" id="savedCount">0 条</span>
                    </div>
                    <div class="saved-list" id="savedList">
                        <div class="saved-empty">还没有暂存的菜谱</div>
                    </div>
                </div>

                <!-- Card: 菜系一览 (折叠) -->
                <div class="card">
                    <div class="card-title" style="margin-bottom:10px;">
                        <span class="icon"></span> 菜系一览
                        <span style="font-weight:400;font-size:12px;color:var(--stone);font-family:var(--sans);margin-left:auto;">点击展开 · 浏览菜品</span>
                    </div>
                    <div class="cuisine-list" id="cuisineList"></div>
                </div>

            </div>

        </div>

    </div>

    <script>
        // ================================================================
        //  1.  DATA  —  直接从 JSON 嵌入（所有菜品完整保留）
        // ================================================================

        const RAW_DATA = {
            "entries": {
                "0": {
                    "uid": 0,
                    "key": ["Sichuan"],
                    "comment": "川菜",
                    "content": "items: [回锅肉, 宫保鸡丁, 麻婆豆腐, 鱼香肉丝, 水煮肉片, 水煮鱼, 夫妻肺片, 蒜泥白肉, 辣子鸡, 毛血旺, 口水鸡, 东坡肘子, 甜皮鸭, 樟茶鸭, 灯影牛肉, 担担面, 钟水饺, 龙抄手, 酸菜鱼, 蚂蚁上树, 宫保虾球, 开水白菜, 鸡豆花, 怪味鸡丝, 凉粉, 粉蒸肉, 咸烧白, 甜烧白, 肝腰合炒, 爆炒腰花, 干煸牛肉丝, 干煸四季豆, 鱼香茄子, 官保藕丁, 魔芋烧鸭, 啤酒鸭, 太白酱肉, 凉拌折耳根, 钵钵鸡, 冷锅串串, 豆花饭, 李庄白肉, 荣州麻辣鸡, 自贡冷吃兔, 富顺豆花, 江油肥肠, 简阳羊肉汤, 芋儿鸡, 重庆火锅, 歌乐山辣子鸡]"
                },
                "1": {
                    "uid": 1,

            let depth = 0;
            for (let i = 0; i < raw.length; i++) {
                const ch = raw[i];
                if (ch === '（' || ch === '(') { depth++;
                    buf += ch; } else if (ch === '）' || ch === ')') { depth--;
                    buf += ch; } else if (ch === ',' && depth === 0) {
                    const trimmed = buf.trim();
                    if (trimmed) items.push(trimmed);
                    buf = '';
                } else {
                    buf += ch;
                }
            }
            const last = buf.trim();
            if (last) items.push(last);
            return items;
        }

        function parseDesc(content, key) {
            const match = content.match(/desc:\s*"([^"]*)"/);
            return match ? match[1] : '';
        }

        const cuisineList = [];
        const entries = RAW_DATA.entries;
        const keys = Object.keys(entries).sort((a, b) => +a - +b);
        for (const k of keys) {
            const e = entries[k];
            const key = e.key[0];
            const name = e.comment;
            const content = e.content;
            const desc = parseDesc(content, key);
            const items = parseItems(content);
            cuisineList.push({
                id: key,
                name: name,
                desc: desc,
                items: items,
                count: items.length
            });
        }

        // ================================================================
        //  3.  STATE
        // ================================================================

        let selectedCuisines = new Set();
        let currentResult = []; // array of { dish, cuisineName }
        let savedRecipes = JSON.parse(localStorage.getItem('dinnerSavedRecipes') || '[]'); // array of { id, dishes: string, cuisineInfo: string, timestamp }

        // ================================================================
        //  4.  DOM REFS
        // ================================================================

        const $ = (id) => document.getElementById(id);
        const cuisineTagsEl = $('cuisineTags');
        const selectionHint = $('selectionHint');
        const numDishes = $('numDishes');
        const numRandom = $('numRandom');
        const btnGenerate = $('btnGenerate');
        const btnRandom = $('btnRandom');
        const resultText = $('resultText');
        const btnSave = $('btnSave');
        const btnCopy = $('btnCopy');
        const btnRegen = $('btnRegen');
        const savedList = $('savedList');
        const savedCount = $('savedCount');
        const cuisineListEl = $('cuisineList');
        const totalBadge = $('totalBadge');
        const totalCuisines = $('totalCuisines');
        const totalDishesCount = $('totalDishesCount');
        const toast = $('toast');

        // ================================================================
        //  5.  RENDER
        // ================================================================

        // --- Stats ---
        let allDishesCount = 0;
        cuisineList.forEach(c => allDishesCount += c.count);
        totalCuisines.textContent = cuisineList.length;
        totalDishesCount.textContent = allDishesCount;
        totalBadge.textContent = `${cuisineList.length} 个菜系 · ${allDishesCount} 道菜品`;

        // --- Cuisine Tags ---
        function renderTags() {
            cuisineTagsEl.innerHTML = '';
            cuisineList.forEach(c => {
                const tag = document.createElement('span');
                tag.className = 'tag' + (selectedCuisines.has(c.id) ? ' active' : '');
                tag.dataset.id = c.id;
                tag.innerHTML = `${c.name} <span class="count">${c.count}</span>`;
                tag.addEventListener('click', () => {
                    if (selectedCuisines.has(c.id)) {
                        selectedCuisines.delete(c.id);
                    } else {
                        selectedCuisines.add(c.id);
                    }
                    renderTags();
                    updateSelectionHint();
                });
                cuisineTagsEl.appendChild(tag);
            });
        }

        function updateSelectionHint() {
            const names = [];
            selectedCuisines.forEach(id => {
                const c = cuisineList.find(x => x.id === id);
                if (c) names.push(c.name);
            });
            if (names.length === 0) {
                selectionHint.innerHTML = '👆 点击标签选择菜系（可多选）';
            } else {
                selectionHint.innerHTML = `已选：<strong>${names.join(' · ')}</strong>（共 ${names.length} 个菜系）`;
            }
        }

        // --- Cuisine Accordion ---
        function renderCuisineAccordion() {
            cuisineListEl.innerHTML = '';
            cuisineList.forEach(c => {
                const item = document.createElement('div');
                item.className = 'cuisine-item';

                const header = document.createElement('div');
                header.className = 'cuisine-header';
                header.innerHTML = `
              <span class="name">${c.name}</span>
              <span class="count">${c.count} 道</span>
              <span class="arrow">▾</span>
            `;
                header.addEventListener('click', () => {
                    item.classList.toggle('open');
                });

                const body = document.createElement('div');
                body.className = 'cuisine-body';
                body.innerHTML = `
              <div class="desc">${c.desc}</div>
              <div class="items">${c.items.join('，')}</div>
            `;

                item.appendChild(header);
                item.appendChild(body);
                cuisineListEl.appendChild(item);
            });
        }

        // --- Saved Recipes ---
        function renderSaved() {
            if (savedRecipes.length === 0) {
                savedList.innerHTML = `<div class="saved-empty">还没有暂存的菜谱</div>`;
                savedCount.textContent = '0 条';
                return;
            }
            let html = '';
            savedRecipes.forEach((r, idx) => {
                html += `
              <div class="saved-item">
                <div class="dishes">${r.dishes}</div>
                <div class="meta">${r.cuisineInfo}</div>
                <button class="del-btn" data-idx="${idx}" title="删除">✕</button>
              </div>
            `;
            });
            savedList.innerHTML = html;
            savedCount.textContent = `${savedRecipes.length} 条`;
            // delete handlers
            savedList.querySelectorAll('.del-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(e.target.dataset.idx);
                    savedRecipes.splice(idx, 1);
                    renderSaved();
                    showToast('已删除暂存');
                });
            });
        localStorage.setItem('dinnerSavedRecipes', JSON.stringify(savedRecipes));
        }

        // --- Result ---
        function renderResult(dishes) {
            if (!dishes || dishes.length === 0) {
                resultText.innerHTML = `<span class="empty-hint">点击「生成」或「随便吃点」试试</span>`;
                return;
            }
            const text = dishes.map(d => d.dish).join('，');
            resultText.textContent = text;
            currentResult = dishes;
        }

        // --- Toast ---
        let toastTimer = null;

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // ================================================================
        //  6.  CORE LOGIC
        // ================================================================

        function getRandomDishes(sourceList, count) {
            if (!sourceList || sourceList.length === 0) return [];
            const n = Math.min(count, sourceList.length);
            const shuffled = [...sourceList];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled.slice(0, n);
        }

        function generateFromSelected() {
            if (selectedCuisines.size === 0) {
                showToast('请先选择至少一个菜系 🥢');
                return;
            }
            const count = parseInt(numDishes.value) || 4;
            // gather all items from selected cuisines
            const pool = [];
            selectedCuisines.forEach(id => {
                const c = cuisineList.find(x => x.id === id);
                if (c) {
                    c.items.forEach(item => {
                        pool.push({ dish: item, cuisineName: c.name });
                    });
                }
            });
            if (pool.length === 0) {
                showToast('所选菜系暂无菜品数据');
                return;
            }
            if (count > pool.length) {
                showToast(`所选菜系共 ${pool.length} 道，已调整为最大数量`);
                numDishes.value = pool.length;
            }
            const picked = getRandomDishes(pool, Math.min(count, pool.length));
            renderResult(picked);
            showToast(`🍲 已生成 ${picked.length} 道菜`);
        }

        function generateRandomAll() {
            const count = parseInt(numRandom.value) || 3;
            const pool = [];
            cuisineList.forEach(c => {
                c.items.forEach(item => {
                    pool.push({ dish: item, cuisineName: c.name });
                });
            });
            if (pool.length === 0) return;
            const n = Math.min(count, pool.length);
            if (count > pool.length) {
                showToast(`总共 ${pool.length} 道，已调整为最大数量`);
                numRandom.value = pool.length;
            }
            const picked = getRandomDishes(pool, n);
            renderResult(picked);
            showToast(`🎲 随机生成 ${picked.length} 道菜`);
        }
        function saveCurrent() {
            if (!currentResult || currentResult.length === 0) {
                showToast('还没有菜谱可以暂存 📌');
                return;
            }
            const dishes = currentResult.map(d => d.dish).join('，');
            // get cuisine set
            const cuisineSet = new Set(currentResult.map(d => d.cuisineName));
            const info = Array.from(cuisineSet).join('·');
            savedRecipes.push({
                id: Date.now() + '_' + Math.random().toString(36).slice(2, 6),
                dishes: dishes,
                cuisineInfo: info || '综合',
                timestamp: new Date().toLocaleString('zh-CN')
            });
            renderSaved();
            showToast('📌 菜谱已暂存');
        }

                function copyCurrent() {
            if (!currentResult || currentResult.length === 0) {
                showToast('还没有菜谱可以复制 📋');
                return;
            }
            const text = currentResult.map(d => d.dish).join('、');
            const cuisineSet = new Set(currentResult.map(d => d.cuisineName));
            const cuisineInfo = Array.from(cuisineSet).join('·');
            const fullText = `🍽 今日菜谱（${cuisineInfo || '综合'}）：\n${text}`;
            
            navigator.clipboard.writeText(fullText).then(() => {
                showToast('食谱已复制');
            }).catch(() => {
                showToast('复制失败，请重试');
            });
        }

        // ================================================================
        //  7.  INIT & EVENTS
        // ================================================================

        renderTags();
        updateSelectionHint();
        renderCuisineAccordion();
        renderSaved();
        renderResult([]);
        // --- Buttons ---
        btnGenerate.addEventListener('click', generateFromSelected);
        btnRandom.addEventListener('click', generateRandomAll);
        btnSave.addEventListener('click', saveCurrent);
        btnCopy.addEventListener('click', copyCurrent);
        btnRegen.addEventListener('click', () => {
            // regenerate using same mode (if selected cuisines exist, use that; else random)
            if (selectedCuisines.size > 0) {
                generateFromSelected();
            } else {
                generateRandomAll();
            }
        });

        // Enter key on number inputs
        numDishes.addEventListener('keydown', (e) => { if (e.key === 'Enter') generateFromSelected(); });
        numRandom.addEventListener('keydown', (e) => { if (e.key === 'Enter') generateRandomAll(); });

        // Clamp number inputs
        [numDishes, numRandom].forEach(inp => {
            inp.addEventListener('change', () => {
                let v = parseInt(inp.value) || 1;
                if (v < 1) v = 1;
                if (v > 20) v = 20;
                inp.value = v;
            });
        });

        // --- On load, select a few default cuisines for demo ---
        // Default: 川菜 + 粤菜 + 湘菜 (popular ones)
        ['Sichuan', 'Cantonese', 'Hunan'].forEach(id => {
            selectedCuisines.add(id);
        });
        renderTags();
        updateSelectionHint();

        console.log('🍽 今天晚餐吃什么 · 已加载', cuisineList.length, '个菜系,', allDishesCount, '道菜品');
    </script>

</body>
</html>
